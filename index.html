<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <header>
      <h1>To‑Do List</h1>
      <p class="subtitle">Small steps, tracked properly.</p>
    </header>

    <form class="add-row" id="addForm">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="What needs doing?"
        maxlength="120"
        autocomplete="off"
        aria-label="New task"
      />
      <button type="submit" class="add-btn" aria-label="Add task">+</button>
    </form>

    <div class="filters" role="tablist" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
      <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
    </div>

    <ul class="task-list" id="taskList" aria-live="polite">
      <!-- tasks injected here -->
    </ul>

    <p class="empty-state" id="emptyState">Nothing here yet — add your first task above.</p>

    <div class="list-footer">
      <span id="itemsLeft">0 items left</span>
      <button type="button" class="link-btn" id="clearCompleted">Clear completed</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
